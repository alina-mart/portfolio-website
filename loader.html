<!-- ─── PAGE LOADER — paste before </body> on every page ─── -->
<!-- Hides automatically on window.load (fonts + images ready) -->

<div id="page-loader" style="
  position:fixed;inset:0;
  background:#12141F;
  display:flex;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .4s ease;
">
  <div style="display:flex;align-items:center;justify-content:center;">
    <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#7C3AED;margin:0 4px;animation:dot-bounce 1.5s ease-in-out infinite;"></span>
    <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#7C3AED;margin:0 4px;animation:dot-bounce 1.5s .25s ease-in-out infinite;"></span>
    <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#7C3AED;margin:0 4px;animation:dot-bounce 1.5s .5s ease-in-out infinite;"></span>
  </div>
  <style>
    @keyframes dot-bounce{0%,40%,100%{transform:translateY(0);opacity:.2}20%{transform:translateY(-5px);opacity:1}}
  </style>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var l = document.getElementById('page-loader');
    if (!l) return;
    l.style.opacity = '0';
    setTimeout(function(){ l.remove(); }, 400);
  });
</script>
<!-- ─────────────────────────────────────── -->
